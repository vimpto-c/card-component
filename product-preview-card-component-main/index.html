<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Young+Serif&display=swap" rel="stylesheet">

    <title>Product preview card component</title>
</head>
<body>
    <div class="container">
        <div class="img">
            <img src="images/image-product-mobile.jpg" alt="perfume" id="img1">
            <img src="images/image-product-desktop.jpg" id="desktopimg">
        </div>
        <div class="text">
        <div class="info">
            <h2>P E R F U M E</h2>
            <h1>Gabrielle Essence Eau De Parfum</h1>
            <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
            Perfumer-Creator for the House of CHANEL.</p>
        </div>
        <div class="price">
            <h1>$149.99</h1>
            <p><del>$169.99</del></p>
        </div>
        <div class="box">
            <div class="cart">
            <img src="images/icon-cart.svg">
            <p>Add to cart</p>
            </div>
        </div>
        </div>
    </div>
</body>
</html>
